services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: noty_brain
      POSTGRES_USER: noty_user
      POSTGRES_PASSWORD: noty_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
    command: sh -c "python manage.py makemigrations && until python manage.py migrate; do echo 'Waiting for Postgres...'; sleep 2; done && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - qdrant
    ports:
      - "8000:8000"

  celery_worker:
    build:
      context: ./backend
    command: celery -A config worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  qdrant_data:
